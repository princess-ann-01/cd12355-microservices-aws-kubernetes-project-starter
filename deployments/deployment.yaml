apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
        - name: analytics
          image: 073823735723.dkr.ecr.us-east-1.amazonaws.com/coworking-analytics:latest
          ports:
            - containerPort: 5153
          envFrom:
            - configMapRef:
                name: analytics-config
            - secretRef:
                name: analytics-secret
